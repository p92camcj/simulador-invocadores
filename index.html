<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador Invocadores</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c4eb6">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('SW registrado ✔️'))
        .catch(err => console.error('SW error ❌', err));
    }
  </script>
</head>
<body>
  <div class="container">
    <h1 id="mainTitle">Simulador «Invocadores»</h1>
    <p id="mainSubtitle" style="text-align: center; margin-top: 0;">
      Un juego diseñado por <a href="https://www.elmeepleazul.es" target="_blank" rel="noopener noreferrer">@elmeepleazul</a>
    </p>
    <div class="header-bar">
      <button id="btnPlayCancel" class="btn secondary cancel hidden">Cancelar selección</button>
      <button id="btnAbility" class="btn secondary hidden">Activar habilidad</button>
      <button id="btnEndTurn" class="btn end hidden">Terminar turno</button>
      <button id="btnHelp" class="btn secondary" onclick="document.getElementById('helpModal').classList.remove('hidden')">Ver ayuda</button>
    </div>

    <div id="helpModal" class="section hidden">
      <div class="play-title">
        <span>Carta de ayuda</span>
        <button class="close-btn" onclick="document.getElementById('helpModal').classList.add('hidden')">✖</button>
      </div>
      <div class="help-cards">
        <img src="assets/cards/ayuda-anverso.png" alt="Carta de ayuda, anverso: resumen de habilidades" class="help-card-img">
        <img src="assets/cards/ayuda-reverso.png" alt="Carta de ayuda, reverso: secuencia de turno" class="help-card-img">
      </div>
    </div>

    <div id="setup" class="section">
      <h2>Configurar partida</h2>
      <label>Jugadoras (2‑5): <input id="numPlayers" type="number" min="2" max="5" value="2" /></label>
      <div id="numError" class="error-msg hidden">Número de jugadoras inválido.</div>

      <label>Set de invocación:
        <select id="selInvocationSet">
          <option value="introductorio">Introductorio (Cilast / Burnio / Aspir)</option>
          <option value="normal" selected>Normal (Cirelia / Baelorith / Aelgorth)</option>
          <option value="floral">Floral (Caisis / Brose / Aures)</option>
        </select>
      </label>

      <button id="cfgNext" class="btn primary">Continuar</button>
      <div id="nameWrap" class="hidden">
        <h3>Nombres</h3>
        <form id="nameForm"></form>
        <button id="btnStart" class="btn primary">Iniciar</button>
      </div>
    </div>
    <div id="picker" class="section hidden">
      <h3 id="pickerTitle"></h3>
      <select id="pickerSelect"></select>
      <div>
        <button id="pickerOk" class="btn primary">OK</button>
        <button id="pickerCancel" class="btn secondary">Cancelar</button>
      </div>
    </div>
    <div id="info" class="section hidden">
      <h2 id="lblTurn"></h2>
      <h3>Invocación: <span id="lblInv"></span></h3>
      <div id="invStatus" class="status"></div>
    </div>
    <div id="boardGrid" class="section board-grid hidden"></div>
  </div>
  <script type="module" src="js/index.js"></script>
  
  <div id="pwa-install-container"></div>
  <script src="js/pwa-install.js"></script>

  <script src="js/version-check.js"></script>

</body>
</html>
